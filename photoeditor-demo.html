<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PhotoEditor Pro - Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,system-ui,sans-serif;background:#0a0a0a;color:#f0f0f0;height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none;}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1a1a1a;}
.header h1{font-size:20px;font-weight:700;color:#f0f0f0;}
.header-actions{display:flex;gap:8px;}
.icon-btn{width:36px;height:36px;border-radius:18px;background:#1a1a1a;border:none;color:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid #1a1a1a;}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;color:#666;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
.tab.active{color:#4A9EFF;border-bottom-color:#4A9EFF;}

/* Content */
.content{flex:1;overflow-y:auto;}

/* Library */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:8px;}
.photo-tile{aspect-ratio:1;background:#1a1a1a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;}
.photo-tile:active{transform:scale(.95);}
.photo-tile .flag{position:absolute;bottom:4px;left:4px;width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;}
.photo-tile .flag.pick{background:#4CAF50;}
.photo-tile .flag.reject{background:#F44336;}
.photo-tile .stars{position:absolute;top:2px;right:4px;font-size:9px;color:#FFD700;}

/* Edit canvas */
.canvas-area{background:#121212;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.canvas-img{width:100%;max-height:300px;object-fit:contain;background:#1a1a1a;filter:var(--filter);}
.canvas-placeholder{width:100%;height:300px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:64px;}

/* Histogram */
.histogram{position:absolute;top:8px;right:8px;width:100px;height:44px;background:rgba(0,0,0,.5);border-radius:6px;overflow:hidden;display:flex;align-items:flex-end;gap:1px;padding:2px;}
.histo-bar{flex:1;background:rgba(255,255,255,.3);border-radius:1px 1px 0 0;min-height:1px;}

/* Before/After */
.before-after{display:flex;width:100%;height:300px;position:relative;}
.ba-half{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a1a;font-size:40px;}
.ba-divider{position:absolute;top:0;bottom:0;left:50%;width:3px;background:#4A9EFF;cursor:ew-resize;}
.ba-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:48px;background:#4A9EFF;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;}

/* Tool panel */
.tool-panel{border-top:1px solid #1a1a1a;background:#0d0d0d;max-height:50vh;overflow-y:auto;}
.tool-content{padding:16px;border-bottom:1px solid #1a1a1a;}
.tool-content h3{font-size:13px;font-weight:700;margin-bottom:12px;color:#999;text-transform:uppercase;letter-spacing:1px;}
.slider-group{margin-bottom:10px;}
.slider-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.slider-row label{font-size:11px;color:#999;}
.slider-row span{font-size:11px;font-weight:600;color:#f0f0f0;min-width:28px;text-align:right;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#333;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:8px;background:#4A9EFF;cursor:pointer;}

/* Bottom toolbar */
.toolbar{display:flex;justify-content:space-around;padding:8px 12px;}
.tool-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:#999;font-size:10px;font-weight:500;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .15s;}
.tool-btn.active{color:#4A9EFF;background:rgba(74,158,255,.1);}
.tool-btn .icon{font-size:18px;}

/* Top bar in edit */
.top-bar{display:flex;align-items:center;padding:10px 16px;gap:12px;border-bottom:1px solid #1a1a1a;}
.top-bar .back{background:none;border:none;color:#f0f0f0;font-size:18px;cursor:pointer;}
.top-bar .title{flex:1;text-align:center;font-size:14px;font-weight:600;}
.undo-redo{display:flex;gap:8px;}
.undo-redo button{background:none;border:none;color:#f0f0f0;font-size:16px;cursor:pointer;padding:4px;}

/* Crop grid */
.crop-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.crop-chip{padding:6px 14px;border-radius:8px;background:#1a1a1a;border:1px solid transparent;color:#999;font-size:11px;font-weight:500;cursor:pointer;}
.crop-chip.active{border-color:#4A9EFF;color:#4A9EFF;background:rgba(74,158,255,.1);}

/* Filters */
.filter-list{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
.filter-card{flex-shrink:0;width:64px;text-align:center;}
.filter-preview{width:64px;height:64px;border-radius:12px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:4px;border:2px solid transparent;}
.filter-card.active .filter-preview{border-color:#4A9EFF;}
.filter-card span{font-size:10px;color:#999;}
.filter-card.active span{color:#4A9EFF;}

/* Export */
.export-section{border-bottom:1px solid #1a1a1a;padding:16px;}
.export-section h3{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.format-row{display:flex;gap:8px;}
.format-btn{flex:1;padding:14px;border-radius:10px;background:#1a1a1a;border:1.5px solid transparent;color:#999;text-align:center;cursor:pointer;font-size:12px;font-weight:600;}
.format-btn.active{border-color:#4A9EFF;color:#4A9EFF;}
.export-main-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;margin-top:24px;background:#4A9EFF;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
.export-main-btn:active{opacity:.8;}

/* AI Panel */
.ai-card{display:flex;align-items:center;gap:10px;padding:12px;background:#121212;border-radius:10px;margin-bottom:6px;border:1px solid #1a1a1a;opacity:.6;}
.ai-icon{font-size:20px;}
.ai-info{flex:1;}
.ai-info .name{font-size:12px;font-weight:600;color:#f0f0f0;}
.ai-info .desc{font-size:10px;color:#999;margin-top:2px;}
.ai-info .meta{font-size:9px;color:#666;margin-top:3px;}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.4;}
.empty h2{font-size:16px;color:#999;margin-bottom:4px;}
.empty p{font-size:13px;color:#666;}
.empty button{margin-top:16px;padding:10px 24px;background:#4A9EFF;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;}

/* Success toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#4CAF50;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:100;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const COLORS={bg:'#0a0a0a',surface:'#121212',surface2:'#1a1a1a',text:'#f0f0f0',text2:'#999',accent:'#4A9EFF',border:'#222'};

// ── State ──
let state={
  tab:'library',
  editMode:false,
  activeTool:null,
  showBeforeAfter:false,
  splitPos:50,
  adjustments:{exposure:0,contrast:0,highlights:0,shadows:0,saturation:0,vibrance:0,temperature:0,tint:0,sharpness:30,noiseReduction:10},
  crop:{ratio:0,rotation:0},
  activePreset:null,
  exportFormat:'jpeg',
  exportQuality:95,
  exportMetadata:true,
  photos:[
    {id:1,emoji:'🌅',stars:3,flag:null,label:null},
    {id:2,emoji:'🐕',stars:5,flag:'pick',label:null},
    {id:3,emoji:'🌸',stars:0,flag:'reject',label:null},
    {id:4,emoji:'🏔️',stars:4,flag:null,label:null},
    {id:5,emoji:'🌊',stars:2,flag:null,label:null},
    {id:6,emoji:'🦋',stars:1,flag:'pick',label:null},
    {id:7,emoji:'🌆',stars:0,flag:null,label:null},
    {id:8,emoji:'🐱',stars:5,flag:null,label:null},
    {id:9,emoji:'🍂',stars:3,flag:'reject',label:null},
  ],
  toast:null,
};

function setState(patch){
  Object.assign(state,patch);
  render();
}

function showToast(msg){
  state.toast=msg;
  render();
  setTimeout(()=>{state.toast=null;render();},2000);
}

// ── Render ──
function render(){
  const app=document.getElementById('app');
  if(state.editMode) app.innerHTML=renderEdit();
  else app.innerHTML=renderMain();
  
  // Attach event handlers
  attachEvents();
}

function renderMain(){
  return `
    <div class="header"><h1>PhotoEditor Pro</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="handleImport()">+</button>
        <button class="icon-btn">🔍</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab ${state.tab==='library'?'active':''}" onclick="setTab('library')">Library</button>
      <button class="tab ${state.tab==='edit'?'active':''}" onclick="setTab('edit')">Edit</button>
      <button class="tab ${state.tab==='export'?'active':''}" onclick="setTab('export')">Export</button>
    </div>
    <div class="content">${state.tab==='library'?renderLibrary():state.tab==='edit'?renderEditTab():renderExport()}</div>
    ${state.toast?`<div class="toast">${state.toast}</div>`:''}
  `;
}

function renderLibrary(){
  return `
    <div style="padding:8px 16px;font-size:12px;color:#999;">
      ${state.photos.length} photos &middot; Sorted by date
    </div>
    <div class="photo-grid">
      ${state.photos.map(p=>`
        <div class="photo-tile" onclick="openPhoto(${p.id})">
          ${p.emoji}
          ${p.flag?`<div class="flag ${p.flag}">${p.flag==='pick'?'✓':'✕'}</div>`:''}
          ${p.stars>0?`<div class="stars">${'★'.repeat(p.stars)}</div>`:''}
        </div>
      `).join('')}
    </div>
  `;
}

function renderEditTab(){
  return `
    <div class="empty">
      <div class="icon">🖼️</div>
      <h2>No photo loaded</h2>
      <p>Select a photo from the Library to start editing</p>
      <button onclick="loadDemoPhoto()">Load Demo Photo</button>
    </div>
  `;
}

function renderExport(){
  return `
    <div class="header" style="border-bottom:none;"><h1>Export</h1></div>
    <div class="content">
      <div class="export-section">
        <h3>File Format</h3>
        <div class="format-row">
          <button class="format-btn ${state.exportFormat==='jpeg'?'active':''}" onclick="setExportFormat('jpeg')">JPEG<br><small>.jpg</small></button>
          <button class="format-btn ${state.exportFormat==='png'?'active':''}" onclick="setExportFormat('png')">PNG<br><small>.png</small></button>
          <button class="format-btn ${state.exportFormat==='tiff'?'active':''}" onclick="setExportFormat('tiff')">TIFF<br><small>.tiff</small></button>
        </div>
      </div>
      <div class="export-section">
        <h3>Quality: ${state.exportQuality}%</h3>
        <input type="range" min="1" max="100" value="${state.exportQuality}" oninput="setExportQuality(this.value)">
      </div>
      <div class="export-section">
        <h3>Options</h3>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#f0f0f0;">
          <input type="checkbox" ${state.exportMetadata?'checked':''} onchange="toggleExportMetadata()">
          Preserve EXIF Metadata
        </label>
      </div>
      <div style="padding:16px;">
        <button class="export-main-btn" onclick="doExport()">📥 Export as ${state.exportFormat.toUpperCase()}</button>
      </div>
    </div>
    ${state.toast?`<div class="toast">${state.toast}</div>`:''}
  `;
}

// ── Edit mode ──
function renderEdit(){
  return `
    <div class="top-bar">
      <button class="back" onclick="closeEdit()">←</button>
      <span class="title">Edit Photo</span>
      <div class="undo-redo">
        <button onclick="showToast('Undo')">↶</button>
        <button onclick="showToast('Redo')">↷</button>
        <button onclick="toggleBeforeAfter()" style="color:${state.showBeforeAfter?COLORS.accent:'#f0f0f0'}">◧</button>
      </div>
    </div>
    
    <div class="content">
      ${state.showBeforeAfter ? renderBeforeAfter() : renderCanvas()}
      
      <div class="tool-panel">
        ${state.activeTool ? renderToolContent() : ''}
        
        <div class="toolbar">
          <button class="tool-btn ${state.activeTool==='crop'?'active':''}" onclick="setTool('crop')"><span class="icon">✂️</span>Crop</button>
          <button class="tool-btn ${state.activeTool==='adjust'?'active':''}" onclick="setTool('adjust')"><span class="icon">⚙️</span>Adjust</button>
          <button class="tool-btn ${state.activeTool==='curve'?'active':''}" onclick="setTool('curve')"><span class="icon">📈</span>Curve</button>
          <button class="tool-btn ${state.activeTool==='filter'?'active':''}" onclick="setTool('filter')"><span class="icon">✨</span>Filters</button>
          <button class="tool-btn ${state.activeTool==='ai'?'active':''}" onclick="setTool('ai')"><span class="icon">🤖</span>AI</button>
        </div>
      </div>
    </div>
    ${state.toast?`<div class="toast">${state.toast}</div>`:''}
  `;
}

function renderCanvas(){
  const adj=state.adjustments;
  const filter=`
    brightness(${1+adj.exposure/100}) 
    contrast(${1+adj.contrast/100}) 
    saturate(${1+adj.saturation/100})
    ${adj.temperature!==0?`sepia(${Math.abs(adj.temperature)/200}) hue-rotate(${adj.temperature>0?'-30deg':'30deg'})`:''}
  `;
  return `
    <div class="canvas-area">
      <div class="canvas-placeholder" style="filter:${filter};">🐕</div>
      <div class="histogram">${Array.from({length:20},()=>`<div class="histo-bar" style="height:${10+Math.random()*90}%"></div>`).join('')}</div>
    </div>
  `;
}

function renderBeforeAfter(){
  return `
    <div class="before-after">
      <div class="ba-half">🐕<br><small style="color:#999">Before</small></div>
      <div class="ba-half" style="filter:brightness(1.1) contrast(1.15) saturate(1.2);">🐕<br><small style="color:#999">After</small></div>
      <div class="ba-divider" style="left:${state.splitPos}%"><div class="ba-handle">◧</div></div>
    </div>
  `;
}

function renderToolContent(){
  const adj=state.adjustments;
  const tool=state.activeTool;
  
  if(tool==='adjust') return `
    <div class="tool-content">
      <h3>Adjustments <button style="background:none;border:none;color:#999;font-size:11px;float:right;cursor:pointer;" onclick="resetAdjustments()">Reset</button></h3>
      ${slider('exposure','Exposure',-100,100,adj.exposure)}
      ${slider('contrast','Contrast',-100,100,adj.contrast)}
      ${slider('highlights','Highlights',-100,100,adj.highlights)}
      ${slider('shadows','Shadows',-100,100,adj.shadows)}
      ${slider('saturation','Saturation',-100,100,adj.saturation)}
      ${slider('vibrance','Vibrance',-100,100,adj.vibrance)}
      ${slider('temperature','Temperature',-100,100,adj.temperature)}
      ${slider('tint','Tint',-100,100,adj.tint)}
    </div>
  `;
  
  if(tool==='crop') return `
    <div class="tool-content">
      <h3>Crop & Rotate</h3>
      <p style="font-size:12px;color:#999;margin-bottom:8px;">Rotation: ${state.crop.rotation}°</p>
      <div class="crop-grid">
        ${['Free','1:1','4:3','3:2','16:9','9:16','2:3','3:4'].map(r=>`
          <button class="crop-chip ${state.crop.ratio===r? 'active':''}" onclick="setCropRatio('${r}')">${r}</button>
        `).join('')}
      </div>
    </div>
  `;
  
  if(tool==='curve') return `
    <div class="tool-content">
      <h3>Tone Curve</h3>
      <svg viewBox="0 0 256 256" style="background:#121212;border-radius:8px;width:100%;max-height:200px;">
        <line x1="0" y1="0" x2="256" y2="256" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
        <path d="M0,256 Q100,170 180,60 T256,0" stroke="#4A9EFF" stroke-width="2" fill="none"/>
        <circle cx="0" cy="256" r="5" fill="#4A9EFF"/><circle cx="256" cy="0" r="5" fill="#4A9EFF"/>
      </svg>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button class="crop-chip active">RGB</button>
        <button class="crop-chip">R</button>
        <button class="crop-chip">G</button>
        <button class="crop-chip">B</button>
      </div>
    </div>
  `;
  
  if(tool==='filter') return `
    <div class="tool-content">
      <h3>Filters</h3>
      <div class="filter-list">
        ${[
          {id:'none',name:'None',emoji:'⚪'},
          {id:'warm',name:'Warm',emoji:'🔆'},
          {id:'cool',name:'Cool',emoji:'❄️'},
          {id:'bw',name:'B&W',emoji:'⬛'},
          {id:'vibrant',name:'Vibrant',emoji:'🌈'},
          {id:'fade',name:'Fade',emoji:'🌸'},
          {id:'cinematic',name:'Cinema',emoji:'🎬'},
          {id:'bright',name:'Bright',emoji:'☀️'},
        ].map(f=>`
          <div class="filter-card ${state.activePreset===f.id?'active':''}" onclick="applyPreset('${f.id}')">
            <div class="filter-preview">${f.emoji}</div>
            <span>${f.name}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  
  if(tool==='ai') return `
    <div class="tool-content">
      <h3>🤖 AI Tools <small style="color:#FFA726;font-weight:400;">Phase 2 Preview</small></h3>
      ${[
        {name:'Auto Enhance',desc:'One-tap ML exposure & color',icon:'✨',onDevice:true,size:'3 MB'},
        {name:'Background Removal',desc:'Isolate subject',icon:'✂️',onDevice:true,size:'5 MB'},
        {name:'Object Removal',desc:'AI inpainting',icon:'🖌️',onDevice:false,size:'Cloud'},
        {name:'Style Transfer',desc:'Artistic looks',icon:'🎨',onDevice:false,size:'Cloud'},
        {name:'Face Retouching',desc:'Smooth, brighten, whiten',icon:'😊',onDevice:true,size:'2 MB'},
        {name:'Smart Tags',desc:'Auto-categorize photos',icon:'🏷️',onDevice:true,size:'4 MB'},
      ].map(a=>`
        <div class="ai-card">
          <div class="ai-icon">${a.icon}</div>
          <div class="ai-info">
            <div class="name">${a.name}</div>
            <div class="desc">${a.desc}</div>
            <div class="meta">${a.onDevice?'📱 On-device':'☁️ API'} &middot; ${a.size}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  
  return '';
}

function slider(key,label,min,max,val){
  return `
    <div class="slider-group">
      <div class="slider-row"><label>${label}</label><span>${val}</span></div>
      <input type="range" min="${min}" max="${max}" value="${val}" oninput="setAdjustment('${key}',this.value)">
    </div>
  `;
}

// ── Events ──
function attachEvents(){/* Handlers are inline onclick */}

function setTab(t){setState({tab:t});}
function setTool(t){setState({activeTool:state.activeTool===t?null:t});}
function loadDemoPhoto(){setState({editMode:true,activeTool:null});}
function closeEdit(){setState({editMode:false});}
function toggleBeforeAfter(){setState({showBeforeAfter:!state.showBeforeAfter});}
function setAdjustment(key,val){state.adjustments[key]=parseInt(val);render();}
function resetAdjustments(){
  state.adjustments={exposure:0,contrast:0,highlights:0,shadows:0,saturation:0,vibrance:0,temperature:0,tint:0,sharpness:30,noiseReduction:10};
  render();
}
function setCropRatio(r){state.crop.ratio=r;render();}
function applyPreset(id){
  state.activePreset=id;
  if(id==='warm'){state.adjustments.temperature=30;state.adjustments.saturation=15;}
  else if(id==='cool'){state.adjustments.temperature=-30;state.adjustments.tint=15;}
  else if(id==='bw'){state.adjustments.saturation=-100;state.adjustments.contrast=20;}
  else if(id==='vibrant'){state.adjustments.vibrance=50;state.adjustments.saturation=25;state.adjustments.contrast=15;}
  else if(id==='fade'){state.adjustments.contrast=-30;state.adjustments.shadows=20;state.adjustments.exposure=10;}
  else if(id==='cinematic'){state.adjustments.contrast=25;state.adjustments.shadows=-15;state.adjustments.saturation=-10;}
  else if(id==='bright'){state.adjustments.exposure=30;state.adjustments.highlights=20;}
  else resetAdjustments();
  render();
}
function setExportFormat(f){state.exportFormat=f;render();}
function setExportQuality(v){state.exportQuality=parseInt(v);render();}
function toggleExportMetadata(){state.exportMetadata=!state.exportMetadata;render();}
function doExport(){showToast(`Exported as ${state.exportFormat.toUpperCase()} ✓`);}
function openPhoto(id){loadDemoPhoto();}
function handleImport(){showToast('Photo imported ✓');}

render();
</script>
</body>
</html>
