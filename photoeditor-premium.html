<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PhotoEditor Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#f5f5f5;font-family:-apple-system,system-ui,sans-serif;color:#1a1a1a;}
body{display:flex;align-items:center;justify-content:center;padding:12px;}

.phone{width:360px;height:720px;background:#fff;border-radius:40px;border:12px solid #000;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;display:flex;flex-direction:column;}

.status-bar{height:28px;background:#000;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;font-weight:600;}

.app{flex:1;display:flex;flex-direction:column;background:#fff;}

.header{padding:16px;border-bottom:1px solid #f0f0f0;text-align:center;}
.header h1{font-size:24px;font-weight:700;margin-bottom:4px;}
.header p{font-size:13px;color:#999;}

.tabs{display:flex;border-bottom:1px solid #e8e8e8;background:#fafafa;}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;color:#999;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
.tab.active{color:#5b3bea;border-bottom-color:#5b3bea;}

.content{flex:1;overflow-y:auto;padding:16px;}

/* Retouch Tool */
.retouch-container{display:flex;flex-direction:column;align-items:center;gap:16px;}
.retouch-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px;}
.retouch-subtitle{font-size:13px;color:#999;text-align:center;}
.retouch-canvas{width:280px;height:280px;background:#f0f0f0;border-radius:20px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:120px;box-shadow:0 8px 24px rgba(0,0,0,.08);}
.brush-tool{position:absolute;top:12px;right:12px;width:48px;height:48px;background:#5b3bea;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(91,59,234,.3);}
.retouch-buttons{display:flex;gap:12px;width:100%;}
.retouch-btn{flex:1;padding:14px;border-radius:12px;border:1.5px solid #e8e8e8;background:#fff;font-size:14px;font-weight:600;color:#1a1a1a;cursor:pointer;transition:all .2s;}
.retouch-btn:active{background:#f5f5f5;}
.retouch-btn.ai{background:#5b3bea;color:#fff;border-color:#5b3bea;box-shadow:0 4px 12px rgba(91,59,234,.2);}

/* Shadow Tool */
.shadow-container{display:flex;flex-direction:column;align-items:center;gap:12px;}
.shadow-title{font-size:22px;font-weight:700;text-align:center;}
.shadow-canvas{width:280px;height:280px;background:linear-gradient(135deg,#ff9a56 0%,#ffb87d 100%);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:100px;position:relative;box-shadow:0 8px 24px rgba(255,154,86,.25);}
.shadow-options{display:flex;gap:10px;margin:8px 0;}
.shadow-btn{padding:10px 20px;border-radius:12px;border:2px solid #e8e8e8;background:#fff;font-size:12px;font-weight:600;color:#666;cursor:pointer;transition:all .2s;}
.shadow-btn.active{border-color:#5b3bea;color:#5b3bea;background:#f5f0ff;}
.shadow-apply{width:100%;padding:14px;border-radius:12px;background:#5b3bea;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(91,59,234,.2);}

/* Batch editing */
.batch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.batch-tile{position:relative;aspect-ratio:1;border-radius:16px;background:#f0f0f0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;cursor:pointer;}
.batch-tile.selected::after{content:'';position:absolute;top:8px;right:8px;width:28px;height:28px;background:#5b3bea;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;}
.batch-export{width:100%;padding:16px;background:#5b3bea;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 12px rgba(91,59,234,.2);}
.template-section{margin-bottom:16px;}
.template-title{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;margin-bottom:10px;}
.template-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;}
.template-item{flex-shrink:0;width:60px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.template-item:nth-child(1){background:#fff;border:2px solid #e8e8e8;}
.template-item:nth-child(2){background:#1a1a1a;}
.template-item:nth-child(3){background:linear-gradient(45deg,#5b3bea 50%,transparent 50%);}
.template-item:nth-child(4){background:#f0f0f0;}
.template-item.active{border-color:#5b3bea;box-shadow:0 0 0 3px rgba(91,59,234,.1);}

/* Bottom nav */
.bottom-nav{display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid #f0f0f0;background:#fafafa;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:6px;font-size:10px;font-weight:600;color:#999;cursor:pointer;}
.nav-item.active{color:#5b3bea;}
.nav-icon{font-size:18px;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#f0f0f0;}
::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:2px;}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px 20px;text-align:center;}
.empty-icon{font-size:48px;opacity:.4;}
.empty-text{font-size:14px;color:#999;}

button{-webkit-tap-highlight-color:transparent;}
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 📡 🔋</span>
  </div>

  <div class="app">
    <div class="header">
      <h1>PhotoEdit</h1>
      <p>AI-powered pro editing</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('retouch')">Retouch</button>
      <button class="tab" onclick="switchTab('shadow')">Shadow</button>
      <button class="tab" onclick="switchTab('batch')">Batch</button>
    </div>

    <div class="content" id="content">
      <!-- Will be populated by JS -->
    </div>

    <div class="bottom-nav">
      <div class="nav-item active" onclick="switchTab('retouch')"><div class="nav-icon">✏️</div>Retouch</div>
      <div class="nav-item" onclick="switchTab('shadow')"><div class="nav-icon">🌑</div>Shadow</div>
      <div class="nav-item" onclick="switchTab('batch')"><div class="nav-icon">📋</div>Batch</div>
      <div class="nav-item" onclick="switchTab('export')"><div class="nav-icon">💾</div>Export</div>
    </div>
  </div>
</div>

<script>
let currentTab = 'retouch';

function switchTab(tab) {
  currentTab = tab;
  
  // Update active tab styling
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
  
  const tabIndex = ['retouch', 'shadow', 'batch', 'export'].indexOf(tab);
  document.querySelectorAll('.tab')[tabIndex].classList.add('active');
  document.querySelectorAll('.nav-item')[tabIndex].classList.add('active');
  
  render();
}

function render() {
  const content = document.getElementById('content');
  
  if (currentTab === 'retouch') {
    content.innerHTML = `
      <div class="retouch-container">
        <div>
          <div class="retouch-title">Retouch easily</div>
          <div class="retouch-subtitle">Remove unwanted objects with AI</div>
        </div>
        <div class="retouch-canvas">
          👑
          <div class="brush-tool" onclick="alert('Brush tool: draw over object to remove')">🖌️</div>
        </div>
        <div class="retouch-buttons">
          <button class="retouch-btn" onclick="alert('Undo last erase')">↶ Undo</button>
          <button class="retouch-btn ai" onclick="alert('AI removing object...')">✨ AI Fill</button>
        </div>
        <button class="retouch-btn" style="width:100%;background:#5b3bea;color:#fff;border-color:#5b3bea;margin-top:12px;" onclick="alert('✓ Retouch complete')">Done</button>
      </div>
    `;
  } 
  else if (currentTab === 'shadow') {
    content.innerHTML = `
      <div class="shadow-container">
        <div class="shadow-title">Add shadows with AI</div>
        <div class="shadow-canvas">👟</div>
        <div class="shadow-options">
          <button class="shadow-btn" onclick="selectShadow('soft')">Soft</button>
          <button class="shadow-btn active" onclick="selectShadow('hard')">Hard</button>
          <button class="shadow-btn" onclick="selectShadow('floating')">Floating</button>
        </div>
        <button class="shadow-apply" onclick="alert('✓ Shadow applied')">Apply this shadow</button>
      </div>
    `;
  }
  else if (currentTab === 'batch') {
    content.innerHTML = `
      <div>
        <button class="batch-export" onclick="alert('Exporting 4 images...')">Export 4 images</button>
        <div class="batch-grid">
          <div class="batch-tile selected" onclick="toggleBatch(this)">👔</div>
          <div class="batch-tile selected" onclick="toggleBatch(this)">🧢</div>
          <div class="batch-tile selected" onclick="toggleBatch(this)">👕</div>
          <div class="batch-tile selected" onclick="toggleBatch(this)">👖</div>
        </div>
        <div class="template-section">
          <div class="template-title">Background template</div>
          <div class="template-row">
            <div class="template-item active">⚪</div>
            <div class="template-item">⚫</div>
            <div class="template-item">🎨</div>
            <div class="template-item">📸</div>
          </div>
        </div>
      </div>
    `;
  }
  else if (currentTab === 'export') {
    content.innerHTML = `
      <div style="text-align:center;padding:40px 20px;">
        <div style="font-size:48px;margin-bottom:16px;">📤</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Ready to export</div>
        <div style="font-size:13px;color:#999;margin-bottom:24px;">Your photos are processed and ready to download</div>
        <button style="width:100%;padding:16px;background:#5b3bea;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(91,59,234,.2);" onclick="alert('✓ Photos exported to gallery')">Export All</button>
      </div>
    `;
  }
}

function selectShadow(type) {
  document.querySelectorAll('.shadow-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function toggleBatch(el) {
  el.classList.toggle('selected');
  const count = document.querySelectorAll('.batch-tile.selected').length;
  document.querySelector('.batch-export').textContent = `Export ${count} image${count !== 1 ? 's' : ''}`;
}

// Initial render
render();
</script>

</body>
</html>
